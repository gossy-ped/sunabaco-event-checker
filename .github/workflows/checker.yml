name: Sunabaco Event Notifier

on:
  schedule:
    # 毎日 朝9:00(日本時間)に実行 (UTCだと 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # ボタンを押して手動で実行できるようにする

jobs:
  build:
    runs-on: ubuntu-latest
    
    # ここでGitHub Secretsの金庫から値を取り出し、プログラムが読める状態にします
    env:
      EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
      EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
      EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
      EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run script
        run: python main.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add events.json
          # 変更がある場合のみコミットしてプッシュする設定
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update events.json" && git push)
