name: SUNABACO Event Checker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:

  run-check:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run script
        run: python sunabaco_checker.py
